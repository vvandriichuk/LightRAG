services:
  postgres:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    container_name: lightrag-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: lightrag
      POSTGRES_PASSWORD: lightrag_secret
      POSTGRES_DB: lightrag
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-extensions.sql:/docker-entrypoint-initdb.d/01-init-extensions.sql
    shm_size: '512mb'
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U lightrag -d lightrag" ]
      interval: 5s
      timeout: 5s
      retries: 10
    command: >
      postgres
        -c shared_buffers=256MB
        -c work_mem=4MB
        -c maintenance_work_mem=128MB
        -c effective_cache_size=512MB
        -c shared_preload_libraries=age
        -c max_connections=20
  lightrag:
    image: ghcr.io/hkuds/lightrag:latest
    build:
      context: .
      dockerfile: Dockerfile
      tags:
        - ghcr.io/hkuds/lightrag:latest
    ports:
      - "${HOST:-0.0.0.0}:${PORT:-9621}:9621"
    volumes:
      - ./data/rag_storage:/app/data/rag_storage
      - ./data/inputs:/app/data/inputs
      - ./config.ini:/app/config.ini
      - ./.env:/app/.env
      # RBAC: mount only modified files to preserve built-in WebUI
      - ./lightrag/api/auth.py:/app/lightrag/api/auth.py
      - ./lightrag/api/utils_api.py:/app/lightrag/api/utils_api.py
      - ./lightrag/api/lightrag_server.py:/app/lightrag/api/lightrag_server.py
      - ./lightrag/api/config.py:/app/lightrag/api/config.py
      - ./lightrag/api/routers/document_routes.py:/app/lightrag/api/routers/document_routes.py
      - ./lightrag/api/routers/graph_routes.py:/app/lightrag/api/routers/graph_routes.py
      - ./lightrag/api/routers/query_routes.py:/app/lightrag/api/routers/query_routes.py
      - ./lightrag/api/routers/ollama_api.py:/app/lightrag/api/routers/ollama_api.py
      - ./lightrag/lightrag.py:/app/lightrag/lightrag.py
      - ./lightrag/operate.py:/app/lightrag/operate.py
      - ./lightrag/prompt.py:/app/lightrag/prompt.py
      - ./lightrag/constants.py:/app/lightrag/constants.py
      - ./lightrag/utils.py:/app/lightrag/utils.py
      - ./lightrag/base.py:/app/lightrag/base.py
      - ./lightrag/kg/networkx_impl.py:/app/lightrag/kg/networkx_impl.py
      - ./lightrag/llm/gemini.py:/app/lightrag/llm/gemini.py
    env_file:
      - .env
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 10
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      WORKING_DIR: "/app/data/rag_storage"
      INPUT_DIR: "/app/data/inputs"
      HOST: "0.0.0.0"
      PORT: "9621"

volumes:
  pgdata:
